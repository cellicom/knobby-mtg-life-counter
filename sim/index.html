<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knobby MTG Life Counter - Simulator</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .simulator-container {
            position: relative;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.1);
            border: 8px solid #333;
            background: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }

        .status {
            position: absolute;
            bottom: 20px;
            font-size: 0.8em;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <h1>KNOBBY SIMULATOR</h1>

    <div class="simulator-container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>

    <div class="controls-hint">
        <strong>Mouse:</strong> Touch/Swipe<br>
        <strong>Wheel / Arrows:</strong> Knob Rotation<br>
        <strong>L / R:</strong> Swipe Left/Right | <strong>U / D:</strong> Swipe Up/Down
    </div>

    <div class="status" id="status">Inizializzazione...</div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var Module = {
            preRun: [],
            postRun: [],
            print: (function () {
                return function (text) {
                    if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                    console.log(text);
                };
            })(),
            canvas: (function () {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function (e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);
                return canvas;
            })(),
            setStatus: function (text) {
                if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
                if (text === Module.setStatus.last.text) return;
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon
                Module.setStatus.last.time = now;
                Module.setStatus.last.text = text;
                statusElement.innerHTML = text;
            },
            totalDependencies: 0,
            monitorRunDependencies: function (left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Downloading... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'Pronto!');
            }
        };
        Module.setStatus('Scaricamento in corso...');
        window.onerror = function () {
            Module.setStatus('Errore durante l\'esecuzione.');
            Module.setStatus = function (text) {
                if (text) console.error('[post-exception status] ' + text);
            };
        };
    </script>
    <script async type="text/javascript" src="knobby_web.js"></script>
</body>

</html>
